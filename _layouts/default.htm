<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <style>
    /* 1. The Global Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* 2. Force the Dark Background on everything */
    html, body {
      background-color: #0d1117 !important;
      color: #c9d1d9 !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }

    body {
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    main {
      max-width: 750px;
      width: 100%;
    }

    /* 3. Post Styling */
    .micro-post {
      border-bottom: 1px solid #30363d;
      padding-bottom: 32px;
      margin-bottom: 32px;
    }

    .post-date {
      color: #8b949e;
      font-size: 0.9rem;
      margin-bottom: 12px;
      display: block;
    }

    /* 4. Ensure links and content look like GitHub */
    .post-content { color: #e6edf3; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    
    /* This removes the footer if it's still hanging around */
    footer { display: none !important; }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>
</body>
</html>
