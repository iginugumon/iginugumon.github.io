---
layout: home
---

{% for post in site.posts limit:10 %}
  <article class="micro-post" style="margin-bottom: 40px; border-bottom: 1px solid #eee;">
    <small><i>{{ post.date | date: "%B %d, %Y @ %H:%M" }}</i></small>
    <div class="content" style="margin-top: 10px;">
      {{ post.content }}
    </div>
  </article>
{% endfor %}
