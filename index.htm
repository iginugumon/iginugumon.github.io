---
layout: default
---

<div id="main_content">
  {% for post in site.posts %}
    <article style="margin-bottom: 40px; border-bottom: 1px solid #3e4751; padding-bottom: 20px;">
      <small style="color: #999;">{{ post.date | date: "%B %d, %Y" }}</small>
      <div style="margin-top: 10px;">
        {{ post.content }}
      </div>
    </article>
  {% endfor %}
</div>
